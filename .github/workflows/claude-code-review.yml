name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    uses: risa-labs-inc/BossConsole-Releases/.github/workflows/plugin-claude-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
